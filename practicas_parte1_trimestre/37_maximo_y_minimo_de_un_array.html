<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let lista = [8,4,7,5,36,2,4];
        let max = lista[0];
        let min = lista[0];

        for (let index = 0; index < lista.length; index++) {
            if(lista[index]<min){
                min = lista[index]
            }
            else if(lista[index]>max){
                max = lista[index]
            }
        }

        document.writeln(max);
        document.writeln(min);

    </script>
</body>
</html>
