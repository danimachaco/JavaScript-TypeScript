<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let notas =[1,5,3,9,6,4,7,1,2,5];

        let aprobados=[];

        for (let index = 0; index < notas.length; index++) {

            if (notas[index]>=5){

                aprobados.push(notas[index]);
            }
        }
        document.writeln(notas+"<br>");
        document.writeln(aprobados);

    </script>
</body>
</html>
