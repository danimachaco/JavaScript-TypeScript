<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let lista = [5,4,2,8,9,7,3];

        document.writeln(lista+"<br>");

        let impares = [];

        for (let x = 0; x < lista.length; x++) {

            if (lista[x] % 2 !=0){
                impares.push(lista[x]);
            }
            
        }

        document.writeln(impares)

    </script>
</body>
