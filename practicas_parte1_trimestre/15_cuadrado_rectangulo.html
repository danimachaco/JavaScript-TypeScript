<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let altura = parseInt(prompt("cual es la altura"));
        let base = parseInt(prompt("cual es la base"));
        if(altura==base){
            document.write("es un cuadrado muy bonito");
        }
        else if(base>altura){
            document.write("Rectángulo dormido")
        } 
        else{
            document.write("Rectángulo despierto")
        }
    
    </script>
</body>
