<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numero = parseInt(prompt("Dame un numero"));
        let numero_final=parseInt(prompt("Dame otro numero"));
        for(let i=0;i<=numero_final;i++){
            if(i%numero==0){
                document.write(i+" ");
            }
        }
    </script>
</body>
</html>
