<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numero = parseInt(prompt("Dame un numero"))
        let suma = 0;
        for (let i = numero; i >= 1; i--) {
            suma=suma+i;
        }
        document.write(suma);
    </script>
</body>
</html>
