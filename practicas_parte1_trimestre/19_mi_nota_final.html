<body>
    <script>
        let numero1 = parseInt(prompt("dame una nota"));
        let numero2 = parseInt(prompt("dame una nota"));
        let numero3 = parseInt(prompt("dame una nota"));
        let notafinal = (numero1+numero2+numero3) / 3

        switch (notafinal){
            case 0:
                document.write("MD "+ notafinal)
            break
            case 1:
                document.write("MD "+ notafinal)
            break
            case 2:
                document.write("MD "+ notafinal)
            break
            case 3:
                document.write("I "+ notafinal)
            break
            case 4:
                document.write("I "+ notafinal)
            break
            case 5:
                document.write("S "+ notafinal)
            break
            case 6:
                document.write("B "+ notafinal)
            break
            case 7:
                document.write("N "+ notafinal)
            break
            case 8 :
                document.write("SB "+ notafinal)
            break
            case 9 :
                document.write("SB "+ notafinal)
            break
            case 10:
                document.write("MH "+notafinal)
            break
        }
    </script>
</body>
