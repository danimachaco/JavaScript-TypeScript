<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let notas = [2,1,3,4,6,5,8,7,9];
        let doble=[];

        for (let index = 0; index < notas.length; index++) {
            
            let ndoble= notas[index]*2;

            doble.push(ndoble);
        }
        document.writeln(notas+"<br>");
        document.writeln(doble);
    </script>
</body>
</html>
