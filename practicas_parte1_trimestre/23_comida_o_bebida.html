<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let pedido = prompt("que menu desea");
        switch(pedido){
            case "carne":
                document.write("acompañada de vino tinto");
                break;
            case "pescado":
                document.write("acompañada de vino blanco");
                break;
            case "verdura":
                document.write("acompañada de agua");
                break;
            default:
                document.write("elija carne, pescado o verdura");
                break;
        }
    </script>
</body>
</html>
